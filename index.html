<!DOCTYPE html>
<html>

<head>
<title>Wellmeadows Hospital</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Wellmeadows Hospital Management</h1>

<button onclick="loadPatients()">Patients</button>
<button onclick="loadDoctors()">Doctors</button>
<button onclick="loadWards()">Wards</button>
<button onclick="loadBeds()">Beds</button>
<button onclick="loadPatientDoctor()">Patient Doctor</button>
<button onclick="loadWardBeds()">Ward Beds</button>
<h2>Admit Patient</h2>

<form id="patientForm">

<input type="text" id="first_name" placeholder="First Name" required>
<input type="text" id="last_name" placeholder="Last Name" required>
<input type="text" id="address" placeholder="Address">
<input type="text" id="phone" placeholder="Phone">

<input type="date" id="dob">

<select id="sex">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<select id="marital_status">
<option value="Single">Single</option>
<option value="Married">Married</option>
</select>

<select id="doctorSelect"></select>

<button type="submit">Admit Patient</button>

</form>
<div id="content"></div>

<script src="app.js"></script>

</body>

</html>
