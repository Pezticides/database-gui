<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Wellmeadows Hospital Management</div>

  <div class="nav-links">
    <a href="#dashboard">Dashboard</a>
    <a href="#patients">Patients</a>
    <a href="#doctors">Doctors</a>
    <a href="#wards">Wards</a>
    <a href="#">Reports</a>
  </div>
</div>

<div class="container">

  <!-- DASHBOARD -->
  <section id="dashboard">
    <h1>Dashboard</h1>

    <div class="dashboard">
      <div class="card"><h3>Patients</h3><p id="totalPatients">0</p></div>
      <div class="card"><h3>Doctors</h3><p id="totalDoctors">0</p></div>
      <div class="card"><h3>Wards</h3><p id="totalWards">0</p></div>
      <div class="card"><h3>Beds</h3><p id="totalBeds">0</p></div>
      <div class="card"><h3>Staff</h3><p id="totalStaff">0</p></div>
    </div>
  </section>

<!-- PATIENTS SECTION -->
<section id="patients">
  <h1>Patient Management</h1>

  <div class="search-box">
    <input type="text" id="search" placeholder="🔍 Search by name, phone, doctor, gender, address...">
  </div>

  <button class="add-btn" onclick="openAddForm()">+ Admit Patient</button>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>DOB</th>
          <th>Gender</th>
          <th>Phone</th>
          <th>Doctor</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="patientTable"></tbody>
    </table>
  </div>
</section>

<!-- ADD PATIENT MODAL -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <h3>Add New Patient</h3>
    <input id="add_first_name" placeholder="First Name *">
    <input id="add_last_name" placeholder="Last Name *">
    <input id="add_address" placeholder="Address">
    <input id="add_phone" placeholder="Phone *">
    <input id="add_dob" type="date">
    <select id="add_sex">
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>
    <select id="add_marital_status">
      <option value="">Marital Status</option>
      <option value="Single">Single</option>
      <option value="Married">Married</option>
      <option value="Widowed">Widowed</option>
      <option value="Divorced">Divorced</option>
    </select>
    <select id="add_doctor_id">
      <option value="">Select Doctor</option>
    </select>
    <div class="modal-buttons">
      <button onclick="saveNewPatient()" class="save-btn">Save Patient</button>
      <button onclick="closeAddForm()" class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<!-- VIEW PATIENT MODAL -->
<div id="viewModal" class="modal">
  <div class="modal-content large">
    <h3 id="viewTitle">Patient Details</h3>
    <div id="viewContent"></div>
    <div class="modal-buttons">
      <button onclick="closeViewForm()" class="cancel-btn">Close</button>
    </div>
  </div>
</div>

<!-- EDIT PATIENT MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Patient</h3>
    <input id="edit_patient_id" type="hidden">
    <input id="edit_first_name" placeholder="First Name *">
    <input id="edit_last_name" placeholder="Last Name *">
    <input id="edit_address" placeholder="Address">
    <input id="edit_phone" placeholder="Phone *">
    <input id="edit_dob" type="date">
    <select id="edit_sex">
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>
    <select id="edit_marital_status">
      <option value="">Marital Status</option>
      <option value="Single">Single</option>
      <option value="Married">Married</option>
      <option value="Widowed">Widowed</option>
      <option value="Divorced">Divorced</option>
    </select>
    <select id="edit_doctor_id">
      <option value="">Select Doctor</option>
    </select>
    <div class="modal-buttons">
      <button onclick="updatePatient()" class="save-btn">Update Patient</button>
      <button onclick="closeEditForm()" class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
